<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Docs · Claude Animations</title>
<meta name="description" content="In-browser docs viewer for my-claude-animations — renders every project markdown file (architecture, consuming, performance, RunPod, changelog) as HTML with a grouped menu." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
<style>
  :root{
    --bg:#030712; --panel:#0b1220; --panel-2:#111827;
    --violet:#8b5cf6; --blue:#3b82f6; --ink:#e5e7eb; --muted:#9ca3af;
    --line:rgba(139,92,246,.18);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased;}
  a{color:var(--violet); text-decoration:none}
  a:hover{text-decoration:underline}

  /* shared top nav */
  .topnav{position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:14px 24px; background:rgba(3,7,18,.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
  .topnav .brand{font-weight:800; color:#fff; margin-right:auto}
  .topnav a{color:var(--muted); font-size:14px; font-weight:600; padding:6px 4px}
  .topnav a:hover{color:#fff; text-decoration:none}
  .topnav a.active{color:#fff; border-bottom:2px solid var(--violet)}

  /* layout: grouped menu + rendered content */
  .layout{display:grid; grid-template-columns:288px 1fr; gap:0; align-items:start}
  @media(max-width:860px){ .layout{grid-template-columns:1fr} }

  .menu{position:sticky; top:57px; align-self:start; max-height:calc(100vh - 57px); overflow:auto;
    padding:22px 18px 60px; border-right:1px solid var(--line); background:var(--bg);}
  @media(max-width:860px){ .menu{position:static; max-height:none; border-right:none; border-bottom:1px solid var(--line)} }
  .menu .ghead{font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--muted);
    margin:18px 8px 8px; }
  .menu .ghead:first-child{margin-top:0}
  .menu a{display:block; color:var(--ink); font-size:14px; font-weight:500; padding:8px 12px; border-radius:9px; line-height:1.3}
  .menu a:hover{text-decoration:none; background:rgba(139,92,246,.10)}
  .menu a.active{background:linear-gradient(120deg,rgba(139,92,246,.22),rgba(59,130,246,.18)); color:#fff; font-weight:700}
  .menu a.page::before{content:"↗"; color:var(--blue); margin-right:8px; font-size:12px}
  .menu a.doc::before{content:"·"; color:var(--violet); margin-right:8px; font-weight:800}

  /* rendered markdown */
  .content{padding:34px 40px 80px; max-width:900px; min-width:0}
  @media(max-width:860px){ .content{padding:26px 20px 60px} }
  .content h1{font-size:34px; font-weight:800; line-height:1.1; margin:.2em 0 .5em;
    background:linear-gradient(120deg,var(--violet),var(--blue)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .content h2{font-size:25px; font-weight:800; margin:1.6em 0 .5em; padding-bottom:.3em; border-bottom:1px solid var(--line)}
  .content h3{font-size:19px; font-weight:700; margin:1.4em 0 .4em}
  .content h4{font-size:16px; font-weight:700; margin:1.2em 0 .3em; color:#cbd5e1}
  .content p{line-height:1.7; margin:.7em 0}
  .content ul,.content ol{line-height:1.7; padding-left:1.4em}
  .content li{margin:.3em 0}
  .content blockquote{margin:1em 0; padding:.6em 1.1em; border-left:3px solid var(--violet);
    background:rgba(139,92,246,.07); border-radius:0 10px 10px 0; color:#d1d5db}
  .content code{background:var(--panel-2); padding:2px 7px; border-radius:6px; font-size:.88em;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:#c4b5fd}
  .content pre{background:#0a0f1c; border:1px solid var(--line); border-radius:12px; padding:16px 18px; overflow:auto; margin:1em 0}
  .content pre code{background:none; padding:0; color:#e5e7eb; font-size:13.5px; line-height:1.6}
  .content table{border-collapse:collapse; width:100%; margin:1.1em 0; font-size:14px; display:block; overflow:auto}
  .content th,.content td{border:1px solid var(--line); padding:9px 12px; text-align:left}
  .content th{background:rgba(139,92,246,.10); font-weight:700; color:#fff}
  .content tr:nth-child(even) td{background:rgba(255,255,255,.02)}
  .content a{font-weight:600}
  .content img{max-width:100%}
  .content hr{border:none; border-top:1px solid var(--line); margin:2em 0}
  .content .mermaid{background:#0a0f1c; border:1px solid var(--line); border-radius:12px; padding:18px; margin:1em 0; text-align:center}
  .content .loading{color:var(--muted)}
  .content .err{padding:18px; border:1px solid var(--line); border-radius:12px; color:var(--muted)}
  .docpath{font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--muted); margin-bottom:6px}
</style>
</head>
<body>

<nav class="topnav">
  <a class="brand" href="index.html">🎬 Claude Animations</a>
  <a href="index.html">Gallery</a>
  <a href="batch.html">Batch · 50 (local)</a>
  <a href="batch_inrunpod.html">Batch · 50 MCP (RunPod)</a>
  <a href="markdown_renderer.html" class="active">📖 Docs</a>
  <a href="https://github.com/rifaterdemsahin/my-claude-animations">GitHub ↗</a>
</nav>

<div class="layout">
  <aside class="menu" id="menu"></aside>
  <main class="content" id="content"><p class="loading">Loading…</p></main>
</div>

<!-- markdown + diagram renderers -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
// Logically grouped menu: the live HTML pages, then the docs by topic.
const NAV = [
  { group: "Pages (live)", items: [
    ["index.html", "Gallery", "page"],
    ["batch.html", "Batch · 50 (local)", "page"],
    ["batch_inrunpod.html", "Batch · 50 MCP (RunPod)", "page"],
  ]},
  { group: "Start here", items: [
    ["README.md", "Overview / README", "doc"],
  ]},
  { group: "Architecture & integration", items: [
    ["ARCHITECTURE.md", "Architecture", "doc"],
    ["CONSUMING.md", "Consuming from another app", "doc"],
    ["DEVELOPING.md", "Developing / extending", "doc"],
  ]},
  { group: "Performance", items: [
    ["PERFORMANCE.md", "Performance — local 50", "doc"],
    ["PERFORMANCE_RATIONALE.md", "Performance rationale (why)", "doc"],
    ["LOCAL_VS_RUNPOD.md", "Local vs RunPod", "doc"],
  ]},
  { group: "RunPod", items: [
    ["RUNPOD.md", "RunPod runbook", "doc"],
    ["RUNPOD_WALKTHROUGH.md", "RunPod walkthrough (build log)", "doc"],
    ["RUNPOD_COST.md", "RunPod expected cost", "doc"],
  ]},
  { group: "Changelog", items: [
    ["UPDATE_LOG.md", "Update log", "doc"],
  ]},
];

const menu = document.getElementById("menu");
const content = document.getElementById("content");

// build the grouped menu
NAV.forEach(({ group, items }) => {
  const h = document.createElement("div"); h.className = "ghead"; h.textContent = group; menu.appendChild(h);
  items.forEach(([file, label, kind]) => {
    const a = document.createElement("a");
    a.className = kind;
    a.textContent = label;
    a.href = kind === "page" ? file : `#${file}`;   // pages navigate away; docs route in-viewer
    a.dataset.file = file;
    menu.appendChild(a);
  });
});

if (window.mermaid) mermaid.initialize({ startOnLoad: false, theme: "dark",
  themeVariables: { fontFamily: "ui-monospace, Menlo, monospace" } });

function setActive(file) {
  menu.querySelectorAll("a.doc").forEach(a => a.classList.toggle("active", a.dataset.file === file));
}

function rewriteLinks() {
  content.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href");
    if (/^https?:|^mailto:/.test(href)) { a.target = "_blank"; a.rel = "noopener"; return; }
    if (href.startsWith("#")) return;
    const clean = href.replace(/^\.\//, "").split("#")[0];
    if (clean.endsWith(".md")) a.setAttribute("href", `#${clean}`);   // route .md links inside the viewer
    // .html links (pages, src) stay as normal navigation
  });
}

async function renderMermaid() {
  const codes = content.querySelectorAll("code.language-mermaid");
  const nodes = [];
  codes.forEach(code => {
    const div = document.createElement("div");
    div.className = "mermaid";
    div.textContent = code.textContent;
    (code.closest("pre") || code).replaceWith(div);
    nodes.push(div);
  });
  if (nodes.length && window.mermaid) { try { await mermaid.run({ nodes }); } catch (e) { /* leave as text */ } }
}

async function loadDoc(file) {
  content.innerHTML = '<p class="loading">Loading ' + file + '…</p>';
  try {
    const res = await fetch(file, { cache: "no-cache" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const md = await res.text();
    content.innerHTML = `<div class="docpath">${file}</div>` + marked.parse(md);
    rewriteLinks();
    await renderMermaid();
    window.scrollTo(0, 0);
  } catch (e) {
    content.innerHTML = `<div class="err">Couldn't load <code>${file}</code> (${e.message}).<br>
      This viewer fetches files over HTTP — open it on the live site
      (<a href="https://rifaterdemsahin.github.io/my-claude-animations/markdown_renderer.html">GitHub Pages</a>)
      or via a local server (<code>python3 -m http.server</code>), not <code>file://</code>.</div>`;
  }
  setActive(file);
}

function current() { return decodeURIComponent(location.hash.slice(1)) || "README.md"; }
window.addEventListener("hashchange", () => loadDoc(current()));
loadDoc(current());
</script>
</body>
</html>
